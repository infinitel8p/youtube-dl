name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Lint, type-check & test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev tools
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (type-check)
        run: mypy src

      - name: Pytest
        run: pytest -q

  frontend:
    name: Type-check & build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Astro check (type-check)
        run: npm run check

      - name: Build
        run: npm run build
